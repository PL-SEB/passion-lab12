<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Passion Lab — Reel</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://use.typekit.net/prr7bwp.css">
<script src="https://player.vimeo.com/api/player.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black:    #080808;
  --white:    #f5f0eb;
  --pink:     #fab3ff;
  --pink-dim: rgba(250,179,255,.18);
  --ui-fade:  rgba(245,240,235,.5);
  --safe-b:   env(safe-area-inset-bottom, 0px);
  --font:     'Inter Tight', sans-serif;
  --fd:       'ivypresto-display', serif;
}

html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  background: var(--black);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  color: var(--white);
  user-select: none;
  -webkit-user-select: none;
}
a { color: inherit; text-decoration: none; }

/* ── SIDE PANELS ───────────────────────────────── */
#side-l, #side-r {
  display: none;
  position: fixed; top: 0; bottom: 0;
  background: var(--black);
  z-index: 50;
}
@media (min-width: 560px) {
  #side-l { display: block; left: 0;  width: calc((100vw - min(100vw, calc(100vh * 9 / 16))) / 2); }
  #side-r { display: block; right: 0; width: calc((100vw - min(100vw, calc(100vh * 9 / 16))) / 2); }
}

/* ── FEED / STAGE ──────────────────────────────── */
#feed {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
}
#stage {
  position: relative;
  width: 100%; height: 100%;
  max-width: min(100vw, calc(100vh * 9 / 16));
  overflow: hidden;
  background: var(--black);
}

/* Cinematic vignette */
#stage::before {
  content: '';
  position: absolute; inset: 0; z-index: 10;
  pointer-events: none;
  background: linear-gradient(to bottom,
    rgba(8,8,8,.65) 0%,
    transparent 20%,
    transparent 62%,
    rgba(8,8,8,.88) 100%);
}

/* ── SLOTS ─────────────────────────────────────── */
.slot {
  position: absolute; inset: 0;
  background: var(--black);
  will-change: transform, opacity;
}
.slot iframe {
  width: 100%; height: 100%;
  border: none; display: block;
  pointer-events: none;
}
.slot.is-current { opacity: 1; z-index: 3; }
.slot.is-behind  { opacity: 0; z-index: 2; pointer-events: none; }
.slot.is-hidden  { opacity: 0; z-index: 1; visibility: hidden; }

@keyframes slideUp   { from{transform:translateY(5%);opacity:0} to{transform:none;opacity:1} }
@keyframes slideDown { from{transform:translateY(-5%);opacity:0} to{transform:none;opacity:1} }
@keyframes exitUp    { from{transform:none;opacity:1} to{transform:translateY(-4%);opacity:0} }
@keyframes exitDown  { from{transform:none;opacity:1} to{transform:translateY(4%);opacity:0} }
.anim-su { animation: slideUp   .55s cubic-bezier(.16,1,.3,1) both; }
.anim-sd { animation: slideDown .55s cubic-bezier(.16,1,.3,1) both; }
.anim-eu { animation: exitUp    .42s cubic-bezier(.4,0,1,1) both; }
.anim-ed { animation: exitDown  .42s cubic-bezier(.4,0,1,1) both; }

/* ── UI LAYER ──────────────────────────────────── */
#ui {
  position: absolute; inset: 0;
  z-index: 20;
  pointer-events: none;
  transition: opacity .5s ease;
}
#ui.faded { opacity: 0; }

/* Logo */
#logo {
  position: absolute;
  top: 24px; left: 24px;
  pointer-events: auto;
  display: block;
  line-height: 0;
  filter: drop-shadow(0 1px 10px rgba(0,0,0,.9));
}
#logo-svg { display: block; }

/* Caption */
#caption {
  position: absolute;
  bottom: calc(88px + var(--safe-b));
  left: 24px; right: 72px;
  transform: translateY(10px);
  opacity: 0;
  transition: transform .5s cubic-bezier(.16,1,.3,1), opacity .5s;
}
#caption.show { transform: none; opacity: 1; }

#cap-client {
  font-family: var(--fd);
  font-style: italic;
  font-weight: 300;
  font-size: clamp(22px, 5.5vw, 32px);
  line-height: 1.08;
  color: #ffffff;
  margin-bottom: 8px;
  letter-spacing: -.2px;
  text-shadow: 0 1px 12px rgba(0,0,0,.5);
}
#cap-type {
  font-family: var(--font);
  font-weight: 500;
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: #ffffff;
  opacity: 0.7;
  text-shadow: 0 1px 8px rgba(0,0,0,.4);
}

/* Mute button — sits above iframes, always clickable */
#mute {
  position: absolute;
  bottom: calc(28px + var(--safe-b));
  right: 20px;
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1px solid rgba(245,240,235,.22);
  background: rgba(8,8,8,.7);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  pointer-events: auto;
  color: #ffffff;
  outline: none;
  -webkit-tap-highlight-color: transparent;
  z-index: 40; /* above iframes (z-index 3) and UI (z-index 20) */
  transition: border-color .25s, background .25s,
              transform .3s cubic-bezier(.34,1.56,.64,1);
}
#mute:hover  { border-color: var(--pink); background: var(--pink-dim); transform: scale(1.08); }
#mute:active { transform: scale(.94); }
#mute svg   { width: 15px; height: 15px; pointer-events: none; display: block; }

/* Progress bar */
#pbar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 2px; background: rgba(245,240,235,.08); z-index: 30;
}
#pbar-fill {
  height: 100%; width: 0%;
  background: var(--pink);
  box-shadow: 0 0 8px var(--pink);
  transition: width .28s linear;
}

/* Pause indicator */
#pause-ind {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(0);
  width: 68px; height: 68px;
  border-radius: 50%;
  background: rgba(8,8,8,.55);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(245,240,235,.18);
  display: flex; align-items: center; justify-content: center;
  z-index: 22; pointer-events: none;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
  opacity: 0;
}
#pause-ind.show { transform: translate(-50%,-50%) scale(1); opacity: 1; }
#pause-ind svg  { width: 26px; height: 26px; margin-left: 3px; }

/* Swipe hint */
#hint {
  position: absolute;
  bottom: calc(110px + var(--safe-b)); left: 50%;
  transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  pointer-events: none; z-index: 22;
  animation: hintAnim 4.2s ease 2s both;
}
@keyframes hintAnim {
  0%   { opacity:0; transform:translateX(-50%) translateY(10px); }
  15%  { opacity:1; transform:translateX(-50%) translateY(0); }
  75%  { opacity:1; transform:translateX(-50%) translateY(0); }
  100% { opacity:0; transform:translateX(-50%) translateY(-10px); }
}
.hint-ch { animation: bounce 1.1s ease infinite; color: var(--ui-fade); }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.hint-lbl {
  font-family: var(--font);
  font-weight: 500;
  font-size: 9px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--ui-fade);
}

/* Tap zones — only at very top and very bottom edges */
#tap-prev, #tap-next {
  position: absolute; left: 0; right: 0;
  z-index: 15; pointer-events: auto;
}
#tap-prev { top: 0;    height: 12%; }
#tap-next { bottom: 0; height: 15%; }

/* Desktop nav — hidden */
#nav { display: none !important; }
.narr {
  width: 38px; height: 38px; border-radius: 50%;
  border: 1px solid rgba(245,240,235,.14);
  background: rgba(8,8,8,.6);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  color: var(--white); font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; outline: none;
  -webkit-tap-highlight-color: transparent;
  transition: background .25s, border-color .25s,
              transform .3s cubic-bezier(.34,1.56,.64,1);
}
.narr:hover { background: var(--pink-dim); border-color: var(--pink); transform: scale(1.1); }

/* Grain overlay */
#grain {
  position: fixed; inset: 0; pointer-events: none; z-index: 300;
  opacity: .03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}
</style>
</head>
<body>

<div id="grain"></div>

<div id="side-l"></div>
<div id="side-r"></div>

<div id="nav">
  <button class="narr" id="btn-up" aria-label="Föregående">↑</button>
  <button class="narr" id="btn-dn" aria-label="Nästa">↓</button>
</div>

<div id="feed">
  <div id="stage">

    <!-- Video slots injected by JS -->

    <div id="ui">

      <!-- Logo as inline SVG text — never breaks regardless of hosting -->
      <a id="logo" href="/">
        <svg id="logo-svg" viewBox="0 0 160 22" fill="none" xmlns="http://www.w3.org/2000/svg" height="22">
          <!-- P -->
          <rect x="0" y="0" width="3.5" height="20" rx="1.5" fill="white"/>
          <rect x="0" y="0" width="12" height="3.5" rx="1.5" fill="white"/>
          <rect x="0" y="8.5" width="10" height="3.5" rx="1.5" fill="white"/>
          <rect x="8.5" y="0" width="3.5" height="12" rx="1.5" fill="white"/>
          <!-- L -->
          <rect x="16" y="0" width="3.5" height="20" rx="1.5" fill="white"/>
          <rect x="16" y="16.5" width="11" height="3.5" rx="1.5" fill="white"/>
          <!-- wordmark -->
          <text x="32" y="16" font-family="'Inter Tight', 'Inter', sans-serif" font-size="13" font-weight="500" letter-spacing="1.5" fill="white" opacity="0.85">PASSION LAB</text>
        </svg>
      </a>

      <div id="caption">
        <div id="cap-client"></div>
        <div id="cap-type"></div>
      </div>

      <div id="hint">
        <svg class="hint-ch" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
          <line x1="12" y1="19" x2="12" y2="5"/>
          <polyline points="5 12 12 5 19 12"/>
        </svg>
        <span class="hint-lbl">Swipe to navigate</span>
      </div>

      <!-- Tap zones live OUTSIDE ui so they never fade -->
    </div><!-- /ui -->

    <!-- Mute button: outside UI layer, high z-index so iframe can't steal clicks -->
    <button id="mute" type="button" aria-label="Ljud av/på">
      <svg id="ico-m" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <line x1="23" y1="9"  x2="17" y2="15"/>
        <line x1="17" y1="9"  x2="23" y2="15"/>
      </svg>
      <svg id="ico-s" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
           style="display:none">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
    </button>

    <!-- Tap zones always active, outside fading UI -->
    <div id="tap-prev"></div>
    <div id="tap-next"></div>

    <div id="pause-ind">
      <svg viewBox="0 0 24 24" fill="white">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
    </div>

    <div id="pbar"><div id="pbar-fill"></div></div>

  </div><!-- /stage -->
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   VIDEO DATA — edit this array to add/remove clips
   id   = Vimeo video ID
   hash = private link token (the h= parameter)
   ═══════════════════════════════════════════════════════════ */
const VIDEOS = [
  { id:'1186559297', hash:'c0bf74d34b', client:'ICA × Skiteam',              type:'Borta bra men hemma smakar bäst' },
  { id:'1186559150', hash:'5b53b2a8ee', client:'ICA Stammis',                type:'The Ark' },
  { id:'1186559171', hash:'8fe2780ecd', client:'All Star',                   type:'Reklamfilm med Foppa' },
  { id:'1186559191', hash:'192a6c9d95', client:'ICA × Skiteam',              type:'Snabba frågor med Skiteam' },
  { id:'1186559224', hash:'d00528e653', client:'ICA',                        type:'Boost your game — Fruit Reboot' },
  { id:'1186559263', hash:'e3d81c3d46', client:'ICA',                        type:'Fruit Reboot — Apple' },
  { id:'1186559282', hash:'4c297d5751', client:'ICA Stammis',                type:'Darin' },
  { id:'1186559246', hash:'611177b8ad', client:'Sveriges Olympiska Kommitté', type:'Den Olympiska Svensken' },
];

const N = VIDEOS.length;

/* ── DOM refs ──────────────────────────────────────────── */
const stage    = document.getElementById('stage');
const ui       = document.getElementById('ui');
const caption  = document.getElementById('caption');
const capCli   = document.getElementById('cap-client');
const capTyp   = document.getElementById('cap-type');
const muteBtn  = document.getElementById('mute');
const icoM     = document.getElementById('ico-m');
const icoS     = document.getElementById('ico-s');
const pbarFill = document.getElementById('pbar-fill');
const pauseInd = document.getElementById('pause-ind');
const btnUp    = document.getElementById('btn-up');
const btnDn    = document.getElementById('btn-dn');
const tapPrev  = document.getElementById('tap-prev');
const tapNext  = document.getElementById('tap-next');

/* ── State ─────────────────────────────────────────────── */
let current   = 0;
let isMuted   = true;   // autoplay requires muted start
let isPaused  = false;
let animating = false;
let uiTimer   = null;
let progTimer = null;

/* ── Build Vimeo slots ─────────────────────────────────── */
const slots   = [];
const players = [];

VIDEOS.forEach((v, i) => {
  const slot   = document.createElement('div');
  slot.className = 'slot is-hidden';

  const iframe = document.createElement('iframe');
  iframe.setAttribute('allow', 'autoplay; fullscreen; picture-in-picture');
  iframe.setAttribute('allowfullscreen', '');
  iframe.setAttribute('frameborder', '0');
  iframe.setAttribute('title', `${v.client} — ${v.type}`);

  const q = new URLSearchParams({
    h:           v.hash,
    autoplay:    i === 0 ? '1' : '0',
    muted:       '1',
    controls:    '0',
    loop:        '0',
    autopause:   '0',
    background:  '0',
    playsinline: '1',
    title:       '0',
    byline:      '0',
    portrait:    '0',
    badge:       '0',
    app_id:      '58479',
  });
  iframe.src = `https://player.vimeo.com/video/${v.id}?${q}`;

  slot.appendChild(iframe);
  stage.insertBefore(slot, ui);
  slots.push(slot);

  const player = new Vimeo.Player(iframe);
  players.push(player);
});

/* Auto-advance when video ends */
players.forEach((p, i) => {
  p.on('ended', () => { if (i === current) navigate('next'); });
});

/* ── Progress bar ──────────────────────────────────────── */
function startProgress() {
  stopProgress();
  (function tick() {
    if (!players[current]) return;
    Promise.all([
      players[current].getCurrentTime(),
      players[current].getDuration(),
    ]).then(([t, d]) => {
      if (d > 0) pbarFill.style.width = (t / d * 100) + '%';
      progTimer = setTimeout(tick, 250);
    }).catch(() => {});
  })();
}
function stopProgress() { clearTimeout(progTimer); }

/* ── Caption ───────────────────────────────────────────── */
function updateCaption(idx) {
  caption.classList.remove('show');
  setTimeout(() => {
    capCli.textContent = VIDEOS[idx].client;
    capTyp.textContent = VIDEOS[idx].type;
    caption.classList.add('show');
  }, 160);
}

/* ── Mute ──────────────────────────────────────────────── */
function syncMuteUI() {
  icoM.style.display = isMuted ? '' : 'none';
  icoS.style.display = isMuted ? 'none' : '';
}

function setMute(val) {
  isMuted = val;
  // Apply to ALL players so state persists across navigation
  players.forEach(p => p.setVolume(isMuted ? 0 : 1).catch(() => {}));
  syncMuteUI();
}

/* Use both click and touchend to handle all devices reliably */
function onMuteTap(e) {
  e.preventDefault();
  e.stopPropagation();
  setMute(!isMuted);
}
muteBtn.addEventListener('click',    onMuteTap);
muteBtn.addEventListener('touchend', onMuteTap);

/* ── Play / Pause ──────────────────────────────────────── */
let pauseHideT;
function togglePause() {
  isPaused = !isPaused;
  if (isPaused) {
    players[current].pause().catch(() => {});
    stopProgress();
    pauseInd.classList.add('show');
  } else {
    players[current].play().catch(() => {});
    startProgress();
    clearTimeout(pauseHideT);
    pauseHideT = setTimeout(() => pauseInd.classList.remove('show'), 700);
  }
}

/* ── UI auto-hide ──────────────────────────────────────── */
function nudgeUI() {
  ui.classList.remove('faded');
  clearTimeout(uiTimer);
  // Keep mute button always reachable — only hide after inactivity
  if (!isPaused) uiTimer = setTimeout(() => ui.classList.add('faded'), 3500);
}
document.addEventListener('mousemove',  nudgeUI);
document.addEventListener('touchstart', nudgeUI, { passive: true });

/* ── Navigate ──────────────────────────────────────────── */
function navigate(dir) {
  if (animating) return;
  animating = true;
  stopProgress();
  pbarFill.style.width = '0%';

  const prev = current;
  const next = dir === 'next'
    ? (current + 1) % N
    : (current - 1 + N) % N;

  players[prev].pause().catch(() => {});
  players[prev].setCurrentTime(0).catch(() => {});

  slots[prev].classList.remove('is-current');
  slots[prev].classList.add('is-behind', dir === 'next' ? 'anim-eu' : 'anim-ed');

  slots[next].classList.remove('is-hidden', 'is-behind');
  slots[next].classList.add('is-current', dir === 'next' ? 'anim-su' : 'anim-sd');

  current = next;
  isPaused = false;
  pauseInd.classList.remove('show');
  updateCaption(current);

  players[current].setVolume(isMuted ? 0 : 1).catch(() => {});
  players[current].play().then(() => {
    // Re-apply volume after play starts (Vimeo sometimes resets it)
    players[current].setVolume(isMuted ? 0 : 1).catch(() => {});
  }).catch(() => {});
  startProgress();
  nudgeUI();

  setTimeout(() => {
    slots[prev].classList.remove('is-behind', 'anim-eu', 'anim-ed');
    slots[prev].classList.add('is-hidden');
    slots[next].classList.remove('anim-su', 'anim-sd');
    animating = false;
    // Warm up the next-next video
    const upcoming = dir === 'next' ? (current + 1) % N : (current - 1 + N) % N;
    players[upcoming].getDuration().catch(() => {});
  }, 640);
}

/* ── Tap zones ─────────────────────────────────────────── */
tapPrev.addEventListener('click', () => navigate('prev'));
tapNext.addEventListener('click', () => navigate('next'));

/* Centre tap → play/pause (desktop click) */
stage.addEventListener('click', e => {
  if (e.target.closest('button, a, #tap-prev, #tap-next, #mute')) return;
  const y = e.clientY / window.innerHeight;
  if (y >= 0.15 && y <= 0.78) togglePause();
});

/* ── Desktop arrows ────────────────────────────────────── */
btnUp && btnUp.addEventListener('click', () => navigate('prev'));
btnDn && btnDn.addEventListener('click', () => navigate('next'));

/* ── Keyboard ──────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') navigate('next');
  if (e.key === 'ArrowUp'   || e.key === 'ArrowLeft')  navigate('prev');
  if (e.key === ' ') { e.preventDefault(); togglePause(); }
  if (e.key.toLowerCase() === 'm') setMute(!isMuted);
});

/* ── Scroll wheel ──────────────────────────────────────── */
let wheelLock = false;
window.addEventListener('wheel', e => {
  if (wheelLock) return;
  wheelLock = true;
  navigate(e.deltaY > 0 ? 'next' : 'prev');
  setTimeout(() => wheelLock = false, 750);
}, { passive: true });

/* ── Touch swipe — native drag feel ────────────────────────── */
let ty0 = 0, tx0 = 0, tt0 = 0, dragging = false, dragY = 0;
const DRAG_THRESHOLD = 8;   // px before we commit to vertical drag
const SNAP_THRESHOLD = 60;  // px drag to trigger navigation

stage.addEventListener('touchstart', e => {
  ty0     = e.touches[0].clientY;
  tx0     = e.touches[0].clientX;
  tt0     = Date.now();
  dragging = false;
  dragY    = 0;
}, { passive: true });

stage.addEventListener('touchmove', e => {
  const dy = e.touches[0].clientY - ty0;
  const dx = Math.abs(e.touches[0].clientX - tx0);

  // Commit to vertical drag once movement is clearly vertical
  if (!dragging) {
    if (Math.abs(dy) < DRAG_THRESHOLD) return;
    if (dx > Math.abs(dy)) return; // horizontal — ignore
    dragging = true;
  }

  dragY = dy;

  // Visual rubber-band drag of current slot
  const resistance = 0.35;
  slots[current].style.transform = `translateY(${dragY * resistance}px)`;
  slots[current].style.transition = 'none';

  // Peek of next/prev slot
  const nextIdx = dragY < 0 ? (current + 1) % N : (current - 1 + N) % N;
  const peekOffset = dragY < 0
    ? `translateY(${100 + dragY * resistance / (window.innerHeight / 100)}%)`
    : `translateY(${-100 + dragY * resistance / (window.innerHeight / 100)}%)`;
  slots[nextIdx].classList.remove('is-hidden');
  slots[nextIdx].classList.add('is-behind');
  slots[nextIdx].style.transform = peekOffset;
  slots[nextIdx].style.transition = 'none';
  slots[nextIdx].style.opacity = Math.min(Math.abs(dragY) / 120, 0.6);
}, { passive: true });

stage.addEventListener('touchend', e => {
  const dy    = e.changedTouches[0].clientY - ty0;
  const dx    = Math.abs(e.changedTouches[0].clientX - tx0);
  const dt    = Date.now() - tt0;
  const vel   = Math.abs(dy) / Math.max(dt, 1) * 1000; // px/s

  // Reset all slots to no inline transform
  function resetSlots() {
    slots.forEach(s => {
      s.style.transform  = '';
      s.style.transition = '';
      s.style.opacity    = '';
    });
  }

  // Quick tap (short, small movement) → play/pause
  if (!dragging && dt < 250 && Math.abs(dy) < 14 && dx < 20) {
    resetSlots();
    const y = ty0 / window.innerHeight;
    if (y >= 0.15 && y <= 0.78) togglePause();
    return;
  }

  // Snap decision: threshold OR fast flick
  if (dragging && (Math.abs(dy) > SNAP_THRESHOLD || vel > 300)) {
    resetSlots();
    navigate(dy < 0 ? 'next' : 'prev');
  } else {
    // Bounce back
    slots[current].style.transition = 'transform .4s cubic-bezier(.34,1.56,.64,1)';
    slots[current].style.transform  = 'translateY(0)';
    const nextIdx = dy < 0 ? (current + 1) % N : (current - 1 + N) % N;
    slots[nextIdx].style.transition = 'transform .4s cubic-bezier(.34,1.56,.64,1), opacity .4s';
    slots[nextIdx].style.transform  = dy < 0 ? 'translateY(100%)' : 'translateY(-100%)';
    slots[nextIdx].style.opacity    = '0';
    setTimeout(() => {
      resetSlots();
      slots[nextIdx].classList.remove('is-behind');
      slots[nextIdx].classList.add('is-hidden');
    }, 420);
  }
  dragging = false; dragY = 0;
}, { passive: true });

/* ── Init ──────────────────────────────────────────────── */
setTimeout(() => {
  slots[0].classList.remove('is-hidden');
  slots[0].classList.add('is-current');
  updateCaption(0);
  startProgress();
  nudgeUI();
  if (players[1]) players[1].getDuration().catch(() => {}); // warm up slot 1
}, 300);
</script>
</body>
