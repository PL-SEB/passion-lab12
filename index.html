<!-- ═══════════════════════════════════════════════
   INSTAGRAM CTA — ersätt hela .insta-wrap-blocket
   ═══════════════════════════════════════════════ -->

<!-- CSS: lägg till/ersätt dessa regler i <style> -->
<style>
/* INSTAGRAM CTA */
.insta-wrap {
  background: var(--pink);
  padding: 220px 48px;
  position: relative;
  overflow: hidden;
  cursor: none;           /* desktop: vi hanterar cursor manuellt */
  display: block;         /* hela blocket är klickbart */
  text-decoration: none;  /* tas bort på <a>-elementet */
  transition: filter .3s;
}
/* Subtil hover-effekt på hela sektionen */
.insta-wrap:hover { filter: brightness(1.03); }

.insta-inner {
  max-width: 1000px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
  pointer-events: none;   /* låter klick "falla igenom" till <a> */
}
.insta-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(0,0,0,.4);
  margin-bottom: 24px;
}
.insta-text {
  font-size: clamp(48px, 7.5vw, 96px);
  font-weight: 500;
  letter-spacing: -2px;
  line-height: 1.0;
  color: var(--black);
}
.insta-text span.italic {
  font-family: var(--fd);
  font-weight: 300;
  font-style: italic;
}

/* Desktop: roterande finger inuti sektionen */
#insta-finger {
  position: absolute;
  width: 72px; height: 72px;
  pointer-events: none;
  z-index: 10;
  transform-origin: center center;
  font-size: 56px;
  line-height: 1;
  display: none;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,.2));
}

/* Desktop: custom cursor */
#insta-cursor {
  width: 120px; height: 120px;
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  opacity: 0;
  transition: opacity .3s;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,.25);
}
#insta-cursor img { width: 100%; height: 100%; object-fit: cover; display: block; }
#insta-cursor.visible { opacity: 1; }

/* Mobil: some-manager + finger */
#insta-cursor-mobile {
  width: 90px; height: 90px;
  border-radius: 50%;
  position: fixed;
  right: 20px; bottom: 36px;
  pointer-events: none;
  z-index: 9997;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,.25);
  opacity: 0;
  transition: opacity .35s;
  cursor: pointer;        /* mobil: klickbar */
  pointer-events: auto;
}
#insta-cursor-mobile img { width: 100%; height: 100%; object-fit: cover; display: block; }
#insta-cursor-mobile.show { opacity: 1; }

#insta-finger-mobile {
  position: fixed;
  right: 120px; bottom: 52px;
  font-size: 44px; line-height: 1;
  pointer-events: none;
  z-index: 9998;
  opacity: 0;
  transition: opacity .35s;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,.2));
  transform-origin: center center;
}
#insta-finger-mobile.show { opacity: 1; }

/* Mobil: hela sektionen klickbar med auto-cursor */
@media (max-width: 768px) {
  .insta-wrap { cursor: pointer !important; }
  #insta-cursor { display: none !important; }
  #insta-finger { display: none !important; }
}
</style>


<!-- HTML: ersätt hela .insta-wrap-diven med en <a>-tagg -->

<!-- Desktop cursor + mobil-element (utanför <a>, före den) -->
<div id="insta-cursor"><img src="some-manager.png" alt=""></div>
<div id="insta-cursor-mobile"><img src="some-manager.png" alt=""></div>
<div id="insta-finger-mobile">👆</div>

<!-- Hela sektionen är nu en <a>-länk -->
<a href="https://www.instagram.com/_passionlab/"
   target="_blank"
   rel="noopener noreferrer"
   class="insta-wrap reveal"
   id="instaWrap"
   aria-label="Följ Passion Lab på Instagram">

  <div id="insta-finger">👆</div>

  <div class="insta-inner">
    <p class="insta-label">Följ oss</p>
    <p class="insta-text">
      Spana in vår <span class="italic">Instagram</span> —<br>vi delar det vi älskar.
    </p>
  </div>

</a>


<!-- ═══════════════════════════════════════════════
   JS: ersätt hela Instagram-blocket i <script>
   ═══════════════════════════════════════════════ -->
<script>
(function(){
  const wrap      = document.getElementById('instaWrap');
  const instaCur  = document.getElementById('insta-cursor');
  const finger    = document.getElementById('insta-finger');
  const mobCur    = document.getElementById('insta-cursor-mobile');
  const mobFinger = document.getElementById('insta-finger-mobile');
  if (!wrap) return;

  const ORBIT_R = 100;
  const isTouch = 'ontouchstart' in window;
  // Hitta mitten av "Instagram"-texten (span.italic) för fingerpekaren
  const instanSpan = wrap.querySelector('span.italic');

  if (isTouch) {
    /* ── MOBIL ── */
    const footer = document.querySelector('footer');

    // Klick på mobil-avatar → öppna Instagram
    mobCur.addEventListener('click', () => {
      window.open('https://www.instagram.com/_passionlab/', '_blank', 'noopener,noreferrer');
    });

    function updateMobile() {
      const wr = wrap.getBoundingClientRect();
      const fr = footer.getBoundingClientRect();
      const show = wr.top < window.innerHeight * 0.85 && fr.top > window.innerHeight;
      mobCur.classList.toggle('show', show);
      mobFinger.classList.toggle('show', show);
    }
    window.addEventListener('scroll', updateMobile, { passive: true });
    updateMobile();

    // Fingret pekar mot "Instagram"-spannet
    (function animMob() {
      if (instanSpan) {
        const lr = instanSpan.getBoundingClientRect();
        const fr = mobFinger.getBoundingClientRect();
        const tx = lr.left + lr.width  / 2;
        const ty = lr.top  + lr.height / 2;
        const fx = fr.left + fr.width  / 2;
        const fy = fr.top  + fr.height / 2;
        const angle = Math.atan2(ty - fy, tx - fx);
        mobFinger.style.transform = `rotate(${angle * 180 / Math.PI + 90}deg)`;
      }
      requestAnimationFrame(animMob);
    })();
    return;
  }

  /* ── DESKTOP ── */
  let curX = 0, curY = 0, smoothX = 0, smoothY = 0, inside = false;

  wrap.addEventListener('mouseenter', () => {
    inside = true;
    instaCur.classList.add('visible');
    // Dölj standard-cursorn när vi är inne i sektionen
    if (typeof cur !== 'undefined') cur.style.opacity = '0';
  });
  wrap.addEventListener('mouseleave', () => {
    inside = false;
    instaCur.classList.remove('visible');
    finger.style.display = 'none';
    if (typeof cur !== 'undefined') cur.style.opacity = '1';
  });
  wrap.addEventListener('mousemove', e => { curX = e.clientX; curY = e.clientY; });

  // Smooth-följ musen med some-manager-cursorn
  (function animCur() {
    smoothX += (curX - smoothX) * 0.12;
    smoothY += (curY - smoothY) * 0.12;
    instaCur.style.left = smoothX + 'px';
    instaCur.style.top  = smoothY + 'px';
    requestAnimationFrame(animCur);
  })();

  // Fingret orbitar runt musen och pekar mot "Instagram"-spannet
  (function animFinger() {
    if (!inside) { requestAnimationFrame(animFinger); return; }
    finger.style.display = 'block';

    const target = instanSpan || wrap.querySelector('.insta-text');
    if (target) {
      const lr = target.getBoundingClientRect();
      const tx = lr.left + lr.width  / 2;
      const ty = lr.top  + lr.height / 2;
      const dx = tx - smoothX;
      const dy = ty - smoothY;
      const angle = Math.atan2(dy, dx);
      const fx = smoothX + Math.cos(angle) * ORBIT_R;
      const fy = smoothY + Math.sin(angle) * ORBIT_R;
      const wr = wrap.getBoundingClientRect();
      finger.style.left      = (fx - wr.left - 36) + 'px';
      finger.style.top       = (fy - wr.top  - 36) + 'px';
      finger.style.transform = `rotate(${angle * 180 / Math.PI + 90}deg)`;
    }
    requestAnimationFrame(animFinger);
  })();
})();
</script>
